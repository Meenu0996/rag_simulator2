<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Simulator | One-File HTML Demo</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(15, 23, 42, 0.78);
      --panel-2: rgba(2, 6, 23, 0.72);
      --text: #eaf2ff;
      --muted: #9eb0d0;
      --cyan: #2ee9ff;
      --purple: #a855f7;
      --green: #3dff9a;
      --amber: #ffd166;
      --red: #ff5c8a;
      --line: rgba(148, 163, 184, 0.22);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(46, 233, 255, 0.2), transparent 30%),
        radial-gradient(circle at 80% 5%, rgba(168, 85, 247, 0.22), transparent 34%),
        radial-gradient(circle at 50% 110%, rgba(61, 255, 154, 0.13), transparent 36%),
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 76%);
      z-index: -2;
    }

    .orb {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.28;
      pointer-events: none;
      z-index: -1;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb.one { left: -170px; top: 130px; background: var(--cyan); }
    .orb.two { right: -140px; top: 260px; background: var(--purple); animation-delay: -3s; }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(70px, -45px, 0) scale(1.12); }
    }

    .app {
      width: min(1220px, calc(100% - 34px));
      margin: 28px auto 60px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.82), rgba(2, 6, 23, 0.78));
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 46px);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(22px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent, rgba(46, 233, 255, 0.08), transparent 48%);
      transform: translateX(-100%);
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      52%, 100% { transform: translateX(100%); }
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(61, 255, 154, 0.28);
      background: rgba(61, 255, 154, 0.07);
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.42; transform: scale(0.72); }
    }

    h1 {
      font-size: clamp(42px, 7vw, 86px);
      line-height: 0.92;
      letter-spacing: -0.075em;
      max-width: 980px;
      margin-bottom: 18px;
    }

    .gradient-text {
      background: linear-gradient(90deg, #fff, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 840px;
      color: #cad7f1;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.55;
      margin-bottom: 26px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 22px;
    }

    .hero-chip {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 6, 23, 0.38);
      border-radius: 18px;
      padding: 15px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .hero-chip strong {
      display: block;
      color: var(--cyan);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .simulator {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      margin-top: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      overflow: hidden;
    }

    .panel-inner { padding: 22px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(46,233,255,0.58), transparent);
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.5);
      color: var(--text);
      padding: 14px;
      font: inherit;
      outline: none;
      transition: 0.25s ease;
    }

    textarea { min-height: 180px; resize: vertical; line-height: 1.5; }
    input { margin-top: 10px; }

    textarea:focus,
    input:focus {
      border-color: rgba(46, 233, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(46, 233, 255, 0.08);
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin: 15px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 1px solid rgba(46, 233, 255, 0.32);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      padding: 11px 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.24s ease;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: var(--cyan);
      box-shadow: 0 0 24px rgba(46, 233, 255, 0.2);
    }

    button.primary {
      background: linear-gradient(90deg, rgba(46, 233, 255, 0.18), rgba(168, 85, 247, 0.18));
    }

    .small-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .pipeline {
      display: grid;
      gap: 14px;
      padding: 22px;
    }

    .step {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 14px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, rgba(2, 6, 23, 0.54), rgba(15, 23, 42, 0.58));
      padding: 18px;
      position: relative;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .step.active {
      border-color: rgba(46, 233, 255, 0.7);
      box-shadow: 0 0 34px rgba(46, 233, 255, 0.13);
      transform: translateY(-2px);
    }

    .step-number {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 950;
      color: #06111f;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      box-shadow: 0 0 24px rgba(46, 233, 255, 0.25);
    }

    .step h2 {
      font-size: 20px;
      letter-spacing: -0.02em;
      margin-bottom: 5px;
    }

    .step p {
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .output {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(46, 233, 255, 0.2);
      background: rgba(46, 233, 255, 0.07);
      color: #dffbff;
      font-size: 12px;
      font-weight: 800;
    }

    .chunk-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .chunk {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2, 6, 23, 0.38);
      min-height: 112px;
    }

    .chunk strong {
      display: block;
      color: var(--cyan);
      font-size: 12px;
      margin-bottom: 7px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chunk span {
      display: block;
      color: #c9d7f2;
      font-size: 12.5px;
      line-height: 1.45;
    }

    .vector-space {
      position: relative;
      height: 260px;
      border-radius: 18px;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        rgba(2, 6, 23, 0.4);
      background-size: 28px 28px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .vector-point {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 18px rgba(168, 85, 247, 0.7);
      transform: translate(-50%, -50%);
      cursor: pointer;
    }

    .vector-point.query {
      width: 20px;
      height: 20px;
      background: var(--green);
      box-shadow: 0 0 24px rgba(61, 255, 154, 0.9);
      z-index: 5;
    }

    .vector-point.selected {
      background: var(--cyan);
      box-shadow: 0 0 26px rgba(46, 233, 255, 0.9);
      animation: selectedPulse 1.2s ease-in-out infinite;
    }

    @keyframes selectedPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.25); }
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(2, 6, 23, 0.92);
      border: 1px solid rgba(46, 233, 255, 0.3);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      opacity: 0;
      transform: translateY(5px);
      transition: 0.15s ease;
      max-width: 220px;
      z-index: 10;
    }

    .bar-list {
      display: grid;
      gap: 10px;
    }

    .bar-item {
      display: grid;
      grid-template-columns: 82px 1fr 48px;
      align-items: center;
      gap: 10px;
      color: #c8d6f2;
      font-size: 12.5px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.16);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 0%;
      transition: width 0.7s ease;
    }

    .context-box,
    .answer-box {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.38);
      padding: 14px;
      color: #c9d7f2;
      line-height: 1.55;
      font-size: 13.5px;
      white-space: pre-wrap;
    }

    .answer-box {
      border-color: rgba(61, 255, 154, 0.24);
      background: rgba(61, 255, 154, 0.055);
    }

    .formula {
      color: var(--amber);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12.5px;
      margin-top: 8px;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .doc { background: var(--purple); }
    .q { background: var(--green); }
    .sel { background: var(--cyan); }

    .mini-nav {
      position: sticky;
      top: 14px;
      display: grid;
      gap: 10px;
    }

    .nav-step {
      text-align: left;
      border-radius: 15px;
      padding: 12px;
      color: var(--muted);
      background: rgba(2, 6, 23, 0.28);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .nav-step.active {
      color: var(--text);
      border-color: rgba(46, 233, 255, 0.55);
      background: rgba(46, 233, 255, 0.08);
    }

    .flow-line {
      height: 34px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-size: 24px;
      opacity: 0.75;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      border: 1px dashed rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      padding: 12px;
    }

    @media (max-width: 980px) {
      .simulator { grid-template-columns: 1fr; }
      .mini-nav { position: static; grid-template-columns: repeat(2, 1fr); }
      .hero-grid, .chunk-grid { grid-template-columns: repeat(2, 1fr); }
    }

      .app { width: min(
